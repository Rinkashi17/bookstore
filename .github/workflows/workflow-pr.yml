name: Python Pull Request Workflow
on: [pull_request]
jobs:
  qa:
    name: Quality check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@master
        with:
          python-version: 3.13
      - name: Install poetry
        run: |
          pip install -U pip
          pip install poetry
          poetry install
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: View poetry --help
        run: poetry --help

      - name: Install dependencies
        shell: bash
        run: python -m poetry install

      - name: Test
        env:
          # Isso garante que o Django tenha tudo que precisa para ligar os motores
          SECRET_KEY: "chave-secreta-dos-tests"
          DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1"
        run: |
          poetry run python manage.py test

      - name: Trigger Deploy to Render
        # Esta linha garante que o deploy só ocorra se os testes passarem na branch main
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wemake Python Stylguide
        uses: wemake-services/wemake-python-styleguide@1.6.1
        continue-on-error: true
        with:
          reporter: "github-pr-review"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
