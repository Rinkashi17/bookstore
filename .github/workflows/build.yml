name: Python application

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Versão atualizada

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5 # Versão atualizada
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        # Se o seu pyproject.toml estiver dentro da pasta bookstore,
        # mude para: run: poetry install --directory bookstore
        run: poetry install

      - name: Test
        env:
          DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1"
          # Se o seu banco pedir outras variáveis (como SECRET_KEY), coloque aqui também
          SECRET_KEY: "uma-chave-qualquer-para-teste"
        run: |
          # O comando de teste do Django é "test", sem o "name:" grudado
          poetry run python manage.py test
